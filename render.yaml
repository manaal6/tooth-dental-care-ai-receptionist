services:
  - type: web
    name: tooth-ai-receptionist
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: VOICE
        value: aura-asteria-en
      - key: SHEETS_WEBHOOK_URL
        sync: false
